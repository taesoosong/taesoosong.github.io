---
layout: base
---
{% assign cv = page.cv_url | default: page.cv_file %}
<div class="page-head">
  <h1 class="page-title">{{ page.title }}</h1>
  {% if cv %}
  <div class="page-actions">
    <a href="{{ cv | relative_url }}" download><i class="fa-solid fa-download" aria-hidden="true"></i> Download</a>
    <a href="{{ cv | relative_url }}" target="_blank" rel="noopener"><i class="fa-solid fa-arrow-up-right-from-square" aria-hidden="true"></i> Open in new tab</a>
  </div>
  {% endif %}
</div>

{% if cv %}
<div class="pdf-frame">
  <object data="{{ cv | relative_url }}#view=FitH" type="application/pdf" width="100%" height="100%">
    <iframe src="{{ cv | relative_url }}#view=FitH" title="{{ page.title }}"></iframe>
    <p class="pdf-fallback">Your browser can&rsquo;t display the embedded PDF. <a href="{{ cv | relative_url }}">Download the CV instead.</a></p>
  </object>
</div>
{% endif %}

{{ content }}
